# Apache CSP snippet for Rocket Questions.
#
# Install inside the alex-online.win VirtualHost that serves /var/www/html/test1,
# then reload Apache:
#
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#
# This replaces the current report-only policy that reports app fetches because
# it has `connect-src 'none'`.

<IfModule mod_headers.c>
  Header always set Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://static.cloudflareinsights.com; script-src-elem 'self' 'unsafe-inline' https://www.googletagmanager.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.google-analytics.com; connect-src 'self' https://alex-online.win:3003 https://www.google-analytics.com; frame-src 'none'; frame-ancestors 'self'; upgrade-insecure-requests"
</IfModule>
