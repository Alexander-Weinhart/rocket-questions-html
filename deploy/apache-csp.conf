# Apache CSP snippet for Rocket Questions.
#
# Install inside the VirtualHost(s) that serve Rocket Questions,
# then reload Apache:
#
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#
# This replaces the current report-only policy that reports app fetches because
# it has `connect-src 'none'`. Apply it to both the root site and the `/test1`
# path if you are exposing both.
#
# Note: `upgrade-insecure-requests` is intentionally omitted here because
# browsers ignore that directive when it is delivered in a report-only policy,
# which creates noisy console warnings without changing runtime behavior.

<IfModule mod_headers.c>
  Header always set Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://static.cloudflareinsights.com https://code.jquery.com https://cdn.jsdelivr.net; script-src-elem 'self' 'unsafe-inline' https://www.googletagmanager.com https://static.cloudflareinsights.com https://code.jquery.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.google-analytics.com https://fonts.gstatic.com; connect-src 'self' https://rocketquestions.com:3003 https://www.rocketquestions.com:3003 https://alex-online.win:3003 https://www.google-analytics.com; frame-src 'self' https://www.youtube-nocookie.com; frame-ancestors 'self'"
</IfModule>
